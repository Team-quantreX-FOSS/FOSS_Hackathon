<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#bfa980">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
table { font-size:20px; border-collapse:collapse; width:100%; }
th, td { padding:14px; text-align:center; border:1px solid #ccc; }
th { background:#333; color:white; }
</style>
</head>
<body>

<div class="topbar">
<h2>FinRisk - Bank Overview</h2>
<h2 id="adminWelcome"></h2>
</div>

<div class="container">
<div class="sidebar">
<h2>Admin</h2>
<button onclick="location.href='/admin_dashboard'">🏛 Banks</button>
<button onclick="location.href='/admin_borrowers'">👥 Borrowers</button>
<button onclick="location.href='/admin_bankers'">🏦 Bankers</button>
<button onclick="location.href='/admin_profile'">⚙ Profile</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<div class="main" id="mainContent" style="display:none;">

<div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid rgba(255,255,255,0.06);">
<div style="width:54px;height:54px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(245,158,11,0.3);">🏛</div>
<div>
<h1 style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#e6d5b8;margin:0;">Registered Banks</h1>
<p style="font-family:'DM Mono',monospace;font-size:12px;color:#666;letter-spacing:2px;text-transform:uppercase;margin:3px 0 0 0;">System Overview · Live Data</p>
</div>
</div>

<table id="bankTable">
<tr>
<th>Bank Name</th>
<th>Branch</th>
<th>IFSC</th>
<th>No. of Bankers</th>
<th>Total Customers</th>
<th>Approved</th>
<th>Rejected</th>
<th>Manual Review</th>
</tr>
</table>

</div>

<!-- NOT LOGGED IN SCREEN -->
<div class="main" id="notLoggedIn" style="display:none;">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:20px;text-align:center;">
    <div style="font-size:64px;">🔒</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#e6d5b8;margin:0;">Access Denied</h2>
    <p style="font-family:'DM Mono',monospace;font-size:15px;color:#bfa980;max-width:380px;line-height:1.7;">You must be logged in as an <b style="color:#f59e0b;">Admin</b> to view this page.</p>
    <button onclick="location.href='/index'" style="padding:14px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#111;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;cursor:pointer;">Go to Login →</button>
</div>
</div>

</div>

<script>
window.addEventListener("DOMContentLoaded", function(){
    fetch("/api/session", { credentials: "include" }).then(r=>r.json()).then(function(sess){
        if(!sess.role || sess.role !== "admin"){
            document.getElementById("mainContent").style.display = "none";
            document.getElementById("notLoggedIn").style.display = "block";
            return;
        }
        document.getElementById("adminWelcome").innerText = "Welcome, " + (sess.name || "Admin");
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("notLoggedIn").style.display = "none";
        loadBanks();
    }).catch(function(){
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("notLoggedIn").style.display = "block";
    });
});

async function loadBanks(){
    let res     = await fetch("/api/bankers", { credentials: "include" });
    let bankers = await res.json();
    let table   = document.getElementById("bankTable");

    if(bankers.length === 0){
        table.innerHTML += "<tr><td colspan='8'>No banks registered yet.</td></tr>";
        return;
    }

    let banks = {};
    bankers.forEach(b => {
        let key = b.bankName;
        if(!banks[key]){
            banks[key] = { name:b.bankName, branch:b.branch||"—", ifsc:b.ifsc, count:0, customers:0, approved:0, rejected:0, manual:0 };
        }
        banks[key].count++;
        banks[key].customers += b.totalCustomers || 0;
        banks[key].approved  += b.approval       || 0;
        banks[key].rejected  += b.rejection      || 0;
        banks[key].manual    += b.manual         || 0;
    });

    Object.values(banks).forEach(b => {
        let row = table.insertRow();
        row.innerHTML = `
<td>${b.name}</td>
<td>${b.branch}</td>
<td>${b.ifsc}</td>
<td>${b.count}</td>
<td>${b.customers}</td>
<td style="color:green;">${b.approved}</td>
<td style="color:red;">${b.rejected}</td>
<td style="color:purple;">${b.manual}</td>`;
    });
}

function logout(){
    if(confirm('Are you sure you want to logout?')){
        fetch('/logout',{method:'POST', credentials:'include'}).finally(function(){ window.location.href='/index'; });
    }
}
</script>

<script>
(function(){
    let container = document.getElementById('toastContainer');
    if(!container){ container = document.createElement('div'); container.id='toastContainer'; document.body.appendChild(container); }
    window.showToast = function(msg,type){ type=type||'info'; let icons={success:'✅',error:'❌',info:'ℹ',warn:'⚠'}; let t=document.createElement('div'); t.className='toast '+type; t.innerHTML='<span>'+(icons[type]||'')+'</span><span>'+msg+'</span>'; container.appendChild(t); setTimeout(function(){ t.classList.add('fade-out'); setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); },300); },3000); };
})();
(function(){
    let sidebar=document.querySelector('.sidebar'); if(!sidebar) return;
    let btn=document.createElement('button'); btn.className='hamburger'; btn.innerHTML='☰'; document.body.appendChild(btn);
    let overlay=document.createElement('div'); overlay.className='sidebar-overlay'; document.body.appendChild(overlay);
    btn.addEventListener('click',function(){ sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
    overlay.addEventListener('click',function(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); });
})();

/* ── BANKER LEADERBOARD ── */
function loadLeaderboard(){
    fetch('/api/bankers', { credentials: 'include' }).then(r=>r.json()).then(function(bankers){
        bankers.sort(function(a,b){
            let ar = a.totalCustomers>0 ? a.approval/a.totalCustomers : 0;
            let br = b.totalCustomers>0 ? b.approval/b.totalCustomers : 0;
            return br-ar || b.totalCustomers-a.totalCustomers;
        });
        let html = '';
        bankers.forEach(function(b,i){
            let rate = b.totalCustomers>0 ? Math.round((b.approval/b.totalCustomers)*100) : 0;
            let rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
            html += '<tr>' +
                '<td class="'+rankClass+'">'+(i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1))+'</td>' +
                '<td style="color:#e6d5b8;font-weight:600;">'+b.name+'</td>' +
                '<td>'+b.bankName+'</td>' +
                '<td>'+b.totalCustomers+'</td>' +
                '<td style="color:#34d399;">'+b.approval+'</td>' +
                '<td><span style="color:#e6d5b8;font-weight:700;">'+rate+'%</span>' +
                '<span class="lb-bar-wrap"><span class="lb-bar-fill" style="width:'+rate+'%;"></span></span></td>' +
            '</tr>';
        });
        var lb = document.getElementById('leaderboardBody');
        if(lb) lb.innerHTML = html || '<tr><td colspan="6" style="text-align:center;color:#555;padding:20px;font-family:DM Mono,monospace;">No bankers registered yet.</td></tr>';
    }).catch(function(){});
}
loadLeaderboard();
setInterval(loadLeaderboard, 15000);

</script>
</body>
</html>
