<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
table{
font-size:20px;
border-collapse:collapse;
width:100%;
}

th, td{
padding:14px;
text-align:center;
}

th{
background:#333;
color:white;
}
</style>

</head>

<body>

<div class="topbar">
<h2>FinRisk - Bank Overview</h2>
</div>

<div class="container">

<div class="sidebar">
<h2>Admin</h2>

<button onclick="location.href='/admin_dashboard'">Banks</button>
<button onclick="location.href='/admin_borrowers'">Borrowers</button>
<button onclick="location.href='/admin_bankers'">Bankers</button>
<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h1>Registered Banks</h1>

<table id="bankTable">
<tr>
<th>Bank Name</th>
<th>Branch</th>
<th>IFSC</th>
<th>Registered in App</th>
<th>% Bankers Using App</th>
<th>% Loans via App</th>
</tr>
</table>

</div>
</div>

<script>

async function loadBanks(){

let res = await fetch("/api/banks");
let banks = await res.json();

let table = document.getElementById("bankTable");

banks.forEach(b => {

let row = table.insertRow();

row.innerHTML = `
<td>${b.name}</td>
<td>${b.branch}</td>
<td>${b.ifsc}</td>
<td>Yes</td>
<td>${Math.floor(Math.random()*100)}%</td>
<td>${Math.floor(Math.random()*100)}%</td>
`;

});

}

function logout(){
window.location.href="/";
}

loadBanks();

</script>

</body>
</html>
