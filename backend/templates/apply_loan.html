<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply for Loan</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
.form-wrap { max-width: 700px; margin: 40px auto; }
.page-header { display:flex; align-items:center; gap:18px; margin-bottom:32px; padding-bottom:18px; border-bottom:2px solid rgba(255,255,255,0.08); }
.page-header .icon-wrap { width:54px; height:54px; background:linear-gradient(135deg,#e6d5b8,#bfa980); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; }
.page-header h1 { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; margin:0; color:#e6d5b8; }
.page-header .subtitle { font-family:'DM Mono',monospace; font-size:12px; color:#888; letter-spacing:2px; text-transform:uppercase; margin:3px 0 0 0; }
.form-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:32px; }
.form-section { margin-bottom:28px; }
.form-section-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#888; margin:0 0 16px 0; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:8px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:#888; margin-bottom:8px; }
.form-group input, .form-group select, .form-group textarea {
    width:100%; padding:12px 14px;
    font-family:'DM Mono',monospace; font-size:15px;
    border-radius:10px; border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05); color:#e6d5b8; transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:#bfa980; }
.form-group input::placeholder, .form-group textarea::placeholder { color:#555; }
.form-group select option { background:#1a1a2e; color:#e6d5b8; }
.form-group textarea { resize:vertical; min-height:70px; }
.file-label { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px; border:1.5px dashed rgba(230,213,184,0.2); background:rgba(230,213,184,0.03); font-family:'DM Mono',monospace; font-size:14px; color:#bfa980; cursor:pointer; transition:all 0.2s; }
.file-label:hover { border-color:#bfa980; }
.file-label.uploaded { border-style:solid; border-color:#34d399; background:rgba(16,185,129,0.06); color:#34d399; }
.file-label input[type=file] { display:none; }
.emi-display { background:rgba(230,213,184,0.08); border:1px solid rgba(230,213,184,0.15); border-radius:10px; padding:16px; text-align:center; margin-bottom:20px; }
.emi-display .emi-label { font-family:'DM Mono',monospace; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#888; }
.emi-display .emi-val { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; color:#e6d5b8; }
.submit-btn { width:100%; padding:16px; border:none; border-radius:12px; background:linear-gradient(135deg,#e6d5b8,#bfa980); color:#111; font-family:'Syne',sans-serif; font-size:18px; font-weight:800; cursor:pointer; transition:all 0.2s; }
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(230,213,184,0.3); }
#errorMsg { font-family:'DM Mono',monospace; font-size:14px; color:#f87171; margin-top:12px; text-align:center; }
#successMsg { font-family:'DM Mono',monospace; font-size:14px; color:#34d399; margin-top:12px; text-align:center; line-height:1.6; }
.step-bar { display:flex; gap:0; margin-bottom:32px; }
.step { flex:1; text-align:center; padding:10px 0; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:1px; color:#555; border-bottom:2px solid rgba(255,255,255,0.08); position:relative; }
.step.active { color:#e6d5b8; border-bottom-color:#bfa980; }
.step.done { color:#34d399; border-bottom-color:#34d399; }
.required-star { color:#f87171; }
</style>
</head>
<body>

<div class="topbar"><h2>FinRisk - Loan Application</h2></div>
<div class="container">
<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='/user_dashboard'">📊 Dashboard</button>
<button onclick="location.href='/loan_check'">🔍 Loan Eligibility</button>
<button onclick="location.href='/loan_tracking'">📁 Loan History</button>
<button onclick="location.href='/financial_advisory'">💡 Advisory</button>
<button onclick="location.href='/apply_loan'">📝 Apply for Loan</button>
<button onclick="location.href='/user_profile'">👤 Profile</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">
<div class="form-wrap">

<div class="page-header">
    <div class="icon-wrap">📝</div>
    <div>
        <h1>Loan Application</h1>
        <p class="subtitle">Complete all sections · Submit · Banker reviews</p>
    </div>
</div>

<div class="form-card">

<!-- SECTION 1: PERSONAL DETAILS -->
<div class="form-section">
<div class="form-section-title">👤 Personal Details</div>
<div class="form-row">
    <div class="form-group"><label>Full Name <span class="required-star">*</span></label><input type="text" id="fullName" placeholder="As per Aadhar card"></div>
    <div class="form-group"><label>Age <span class="required-star">*</span></label><input type="number" id="age" placeholder="e.g. 28" min="18" max="70"></div>
</div>
<div class="form-row">
    <div class="form-group"><label>Phone Number <span class="required-star">*</span></label><input type="text" id="phone" placeholder="10-digit mobile number" maxlength="10"></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="youremail@gmail.com"></div>
</div>
<div class="form-group"><label>Residential Address <span class="required-star">*</span></label><textarea id="address" placeholder="Flat/House No, Street, City, State, PIN"></textarea></div>
<div class="form-row">
    <div class="form-group">
        <label>Employment Type <span class="required-star">*</span></label>
        <select id="employment" onchange="toggleEmployment()">
            <option value="">Select type</option>
            <option value="Salaried">Salaried (Private)</option>
            <option value="Salaried Govt">Salaried (Government)</option>
            <option value="Self Employed">Self Employed / Freelancer</option>
            <option value="Business Owner">Business Owner</option>
            <option value="Student">Student</option>
            <option value="Retired">Retired</option>
        </select>
    </div>
    <div class="form-group" id="employerGroup"><label>Employer / Company Name</label><input type="text" id="employer" placeholder="e.g. Infosys, HDFC Bank"></div>
</div>
</div>

<!-- SECTION 2: KYC DOCUMENTS -->
<div class="form-section">
<div class="form-section-title">🪪 KYC Documents</div>
<div class="form-row">
    <div class="form-group"><label>Aadhar Number <span class="required-star">*</span></label><input type="text" id="aadhar" placeholder="XXXX XXXX XXXX" maxlength="14" oninput="formatAadhar(this)"></div>
    <div class="form-group"><label>PAN Number <span class="required-star">*</span></label><input type="text" id="pan" placeholder="ABCDE1234F" maxlength="10" oninput="this.value=this.value.toUpperCase()"></div>
</div>
<div class="form-row">
    <div class="form-group">
        <label>Aadhar Card (Front) <span class="required-star">*</span></label>
        <label class="file-label" id="aadharLabel" for="aadharFile">
            <span id="aadharIcon">📎</span><span id="aadharTxt">Upload image</span>
            <input type="file" id="aadharFile" accept="image/*,.pdf" onchange="handleFile('aadharFile','aadharLabel','aadharIcon','aadharTxt','aadharData')">
        </label>
    </div>
    <div class="form-group">
        <label>PAN Card <span class="required-star">*</span></label>
        <label class="file-label" id="panLabel" for="panFile">
            <span id="panIcon">📎</span><span id="panTxt">Upload image</span>
            <input type="file" id="panFile" accept="image/*,.pdf" onchange="handleFile('panFile','panLabel','panIcon','panTxt','panData')">
        </label>
    </div>
</div>
</div>

<!-- SECTION 3: FINANCIAL DOCUMENTS -->
<div class="form-section">
<div class="form-section-title">💰 Financial Documents</div>
<div class="form-row">
    <div class="form-group">
        <label>Salary Slip / Income Proof <span class="required-star">*</span></label>
        <label class="file-label" id="salaryLabel" for="salaryFile">
            <span id="salaryIcon">📎</span><span id="salaryTxt">Upload latest salary slip</span>
            <input type="file" id="salaryFile" accept="image/*,.pdf" onchange="handleFile('salaryFile','salaryLabel','salaryIcon','salaryTxt','salaryData')">
        </label>
    </div>
    <div class="form-group">
        <label>Bank Statement (6 months)</label>
        <label class="file-label" id="bankStmtLabel" for="bankStmtFile">
            <span id="bankStmtIcon">📎</span><span id="bankStmtTxt">Upload PDF or image</span>
            <input type="file" id="bankStmtFile" accept="image/*,.pdf" onchange="handleFile('bankStmtFile','bankStmtLabel','bankStmtIcon','bankStmtTxt','bankStmtData')">
        </label>
    </div>
</div>
</div>

<!-- SECTION 4: LOAN DETAILS -->
<div class="form-section">
<div class="form-section-title">🏦 Loan Details</div>
<div class="form-row">
    <div class="form-group"><label>Loan Amount (₹) <span class="required-star">*</span></label><input type="number" id="loan" placeholder="e.g. 500000" oninput="calcEmi()"></div>
    <div class="form-group">
        <label>Loan Type <span class="required-star">*</span></label>
        <select id="loanType">
            <option value="">Select type</option>
            <option>Home Loan</option>
            <option>Personal Loan</option>
            <option>Education Loan</option>
            <option>Vehicle Loan</option>
            <option>Business Loan</option>
            <option>Gold Loan</option>
            <option>Mudra Loan</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group"><label>Tenure (months) <span class="required-star">*</span></label><input type="number" id="tenure" placeholder="e.g. 60" oninput="calcEmi()"></div>
    <div class="form-group"><label>Risk Score</label><input type="number" id="score" placeholder="Auto-filled from Loan Eligibility"></div>
</div>
<div class="form-group"><label>Purpose of Loan <span class="required-star">*</span></label><textarea id="purpose" placeholder="Briefly describe why you need this loan (e.g. to purchase a car, fund college education, expand business)"></textarea></div>
</div>

<!-- SECTION 5: BANK DETAILS -->
<div class="form-section">
<div class="form-section-title">🏧 Bank Account Details</div>
<div class="form-group"><label>Account Holder Name <span class="required-star">*</span></label><input type="text" id="accountHolder" placeholder="As per bank records"></div>
<div class="form-row">
    <div class="form-group"><label>Bank Account Number <span class="required-star">*</span></label><input type="text" id="accountNumber" placeholder="e.g. 1234567890"></div>
    <div class="form-group"><label>IFSC Code <span class="required-star">*</span></label><input type="text" id="ifsc" placeholder="e.g. SBIN0000001" oninput="this.value=this.value.toUpperCase()"></div>
</div>
</div>

<div class="emi-display">
    <div class="emi-label">Estimated Monthly EMI</div>
    <div class="emi-val" id="emiDisplay">₹ —</div>
</div>

<button class="submit-btn" onclick="submitApplication()">Submit Application →</button>
<p id="errorMsg"></p>
<p id="successMsg"></p>

</div>
</div>
</div>
</div>

<script>
/* Store uploaded file data */
let fileStore = { aadharData:null, panData:null, salaryData:null, bankStmtData:null };
let _sessionName  = "";
let _sessionPhone = "";

window.addEventListener("DOMContentLoaded", function(){
    fetch("/api/session", {credentials:"include"}).then(r=>r.json()).then(function(sess){
        if(!sess.role || sess.role !== "user"){ window.location.href="/"; return; }
        _sessionName = sess.name || "";
        if(_sessionName) document.getElementById("fullName").value = _sessionName;

        fetch("/api/financial_data", {credentials:"include"}).then(r=>r.json()).then(function(fd){
            _sessionPhone = fd.phone || sess.phone || "";
            if(_sessionPhone) document.getElementById("phone").value = _sessionPhone;
            let score = fd.risk_score || "";
            if(score) document.getElementById("score").value = score;
        });
    }).catch(function(){ window.location.href="/"; });
});

function formatAadhar(inp){ /* unchanged */ }
function toggleEmployment(){ /* unchanged */ }
function handleFile(inputId, lblId, iconId, txtId, storeKey){ /* unchanged */ }
function calcEmi(){ /* unchanged */ }

async function submitApplication(){
    let errEl = document.getElementById("errorMsg");
    let sucEl = document.getElementById("successMsg");
    errEl.innerText = ""; sucEl.innerText = "";

    // ... all your validation code remains exactly the same ...

    let phone = document.getElementById("phone").value.trim();

    // ── CRITICAL FIX: Await financial_data update BEFORE applying loan ──
    try {
        let fdRes = await fetch("/api/financial_data", {credentials:"include"});
        let fd = await fdRes.json();
        let payload = Object.assign({}, fd, { phone: phone });
        await fetch("/api/financial_data", {
            method: "POST",
            credentials: "include",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
    } catch(e) {}

    // Now submit loan
    fetch("/apply_loan",{credentials:"include", method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:fullName, age, phone,
            loanAmount:Number(loan), loanType,
            tenure:Number(tenure), emi,
            risk_score:Number(score),
            address, employment, purpose, aadhar, pan
        })
    })
    .then(r=>r.json())
    .then(function(res){
        if(res.message==="no_banker"){
            sucEl.innerText="✅ Application submitted! No banker available yet — will be picked up once a banker registers.";
        } else {
            sucEl.innerText="✅ Application submitted successfully! Redirecting...";
            showToast('✅ Loan application submitted!','success');
        }
        setTimeout(() => { window.location.href="/user_dashboard"; }, 1800);
    })
    .catch(() => { errEl.innerText="Server error. Please try again."; });
}
function logout(){
    fetch('/logout',{credentials:"include",method:'POST'}).finally(function(){ window.location.href="/"; });
}
</script>

<script>

/* ── TOAST SYSTEM ── */
(function(){
    let container = document.getElementById('toastContainer');
    if(!container){
        container = document.createElement('div');
        container.id = 'toastContainer';
        document.body.appendChild(container);
    }
    window.showToast = function(msg, type){
        type = type || 'info';
        let icons = {success:'✅', error:'❌', info:'ℹ', warn:'⚠'};
        let t = document.createElement('div');
        t.className = 'toast ' + type;
        t.innerHTML = '<span>' + (icons[type]||'') + '</span><span>' + msg + '</span>';
        container.appendChild(t);
        setTimeout(function(){
            t.classList.add('fade-out');
            setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 300);
        }, 3000);
    };
})();

/* ── MOBILE SIDEBAR ── */
(function(){
    let sidebar = document.querySelector('.sidebar');
    if(!sidebar) return;
    let btn = document.createElement('button');
    btn.className = 'hamburger';
    btn.innerHTML = '☰';
    document.body.appendChild(btn);
    let overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);
    btn.addEventListener('click', function(){
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    });
    overlay.addEventListener('click', function(){
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
    });
})();

</script>
<script src="{{ url_for('static', filename='finrisk_shared.js') }}"></script>
</body>
</html>
