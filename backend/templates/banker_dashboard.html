<!DOCTYPE html>

<html>

<head>

<title>Banker Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.controls{
margin:20px;
text-align:center;
}

button {
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform: scale(1.05);
}

td {
    transition:0.3s;
}


.low { color:green; font-weight:bold; }
.medium { color:orange; font-weight:bold; }
.high { color:red; font-weight:bold; }

.controls button{
margin:8px;
font-size:22px;
padding:10px 18px;
}

#userTable {
font-size:22px;
border-collapse: collapse;
width:100%;
}

#userTable th, #userTable td {
padding:16px;
text-align:center;
}

#userTable th {
background:#333;
color:white;
font-size:24px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.popup-content{
background:rgb(70, 58, 58);
padding:25px;
width:320px;
margin:100px auto;
border-radius:10px;
text-align:center;
font-size:22px;
}

.popup-content h3{
font-size:26px;
}

.popup-content input{
font-size:22px;
padding:10px;
width:90%;
}

.popup-content button{
font-size:20px;
margin:5px;
}

</style>

</head>

<body>

<div class="topbar">
<h2>FinRisk - Banker Dashboard</h2>
</div>

<div class="container">

<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='/banker_dashboard'">Dashboard</button>
<button onclick="location.href='/banker_review'">Review Queue</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Borrower Applications</h1>

<div class="controls">
<button onclick="showAll()">Show All</button>
<button onclick="filterLowRisk()">Low Risk Only</button>
<button onclick="sortByScore()">Sort by Score</button>
</div>

<div class="loan-card">

<table border="1" id="userTable">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Loan Amount</th>
<th>Loan Type</th>
<th>Tenure</th>
<th>EMI</th>
<th>Risk Score</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

</div>

</div>
</div>

<div id="rejectPopup" class="popup">
<div class="popup-content">
<h3>Reason for Rejection</h3>
<input type="text" id="rejectReason" placeholder="Enter reason"><br><br>
<button onclick="submitReject()">Submit</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

let table = document.getElementById("userTable");
let selectedId = null;
let applications = [];

/* FETCH FROM BACKEND */
function fetchUsers(){
    fetch("/users")
    .then(res => res.json())
    .then(data => {
        // /users returns array of arrays:
        // [id, name, phone, loanAmount, loanType, tenure, emi, risk_score, allocated_banker, loan_status, reason]
        applications = data.map(u => ({
            id:       u[0],
            name:     u[1],
            phone:    u[2],
            loan:     u[3],
            loanType: u[4],
            tenure:   u[5],
            emi:      u[6],
            score:    u[7],
            banker:   u[8],
            status:   u[9],
            reason:   u[10]
        }));
        loadTable(applications);
    });
}

/* LOAD TABLE */
function loadTable(data){

table.innerHTML = `
<tr>
<th>Name</th>
<th>Phone</th>
<th>Loan Amount</th>
<th>Loan Type</th>
<th>Tenure</th>
<th>EMI</th>
<th>Risk Score</th>
<th>Status</th>
<th>Action</th>
</tr>
`;

if(data.length === 0){
    table.innerHTML += "<tr><td colspan='9'>No applications found</td></tr>";
    return;
}

data.forEach((u) => {

    let color = "black";
    let riskLabel = "";

    if(u.score >= 75){ color = "green";  riskLabel = "Low Risk"; }
    else if(u.score >= 55){ color = "orange"; riskLabel = "Medium Risk"; }
    else { color = "red"; riskLabel = "High Risk"; }

    let row = table.insertRow();

    row.innerHTML = `
<td>${u.name || ""}</td>
<td>${u.phone || ""}</td>
<td>₹${u.loan || 0}</td>
<td>${u.loanType || ""}</td>
<td>${u.tenure || ""}</td>
<td>₹${u.emi || 0}</td>
<td style="color:${color}; font-weight:bold;">${u.score} (${riskLabel})</td>
<td>${u.status || "Pending"}${u.reason ? "<br><small>(" + u.reason + ")</small>" : ""}</td>
<td>
<button onclick="approve(${u.id})">Approve</button>
<button onclick="openReject(${u.id})">Reject</button>
<button onclick="manualReview(${u.id})">Review</button>
</td>
`;

});

}

/* APPROVE */
function approve(id){
fetch("/banker_action",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ user_id:id, action:"Approved", reason:"Approved by banker" })
})
.then(()=> fetchUsers())
.catch(err=>console.error(err));
}

/* REJECT */
function openReject(id){
selectedId = id;
document.getElementById("rejectReason").value = "";
document.getElementById("rejectPopup").style.display = "block";
}

function submitReject(){
let reason = document.getElementById("rejectReason").value;
fetch("/banker_action",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ user_id:selectedId, action:"Rejected", reason:reason })
})
.then(()=>{
    closePopup();
    fetchUsers();
})
.catch(err=>console.error(err));
}

/* MANUAL REVIEW */
function manualReview(id){
fetch("/banker_action",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ user_id:id, action:"Manual Review", reason:"Under verification" })
})
.then(()=> fetchUsers())
.catch(err=>console.error(err));
}

/* FILTER */
function filterLowRisk(){
let filtered = applications.filter(u => u.score >= 75);
loadTable(filtered);
}

/* SHOW ALL */
function showAll(){
fetchUsers();
}

/* SORT */
function sortByScore(){
let sorted = [...applications].sort((a,b)=>b.score-a.score);
loadTable(sorted);
}

/* CLOSE POPUP */
function closePopup(){
document.getElementById("rejectPopup").style.display = "none";
}

/* LOGOUT */
function logout(){
window.location.href = "/";
}

/* INITIAL LOAD */
fetchUsers();

</script>

</body>
</html>
