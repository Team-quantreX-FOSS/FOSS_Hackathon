<!DOCTYPE html>
<html>
<head>
<title>Banker Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }

.page-header {
    display: flex; align-items: center; gap: 18px;
    margin: 32px 0 28px 0;
    padding-bottom: 18px;
    border-bottom: 2px solid rgba(255,255,255,0.08);
}
.page-header .icon-wrap {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, #e6d5b8, #bfa980);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(230,213,184,0.3);
}
.page-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800; margin: 0;
    color: #e6d5b8;
}
.page-header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: #888;
    letter-spacing: 2px; text-transform: uppercase; margin: 3px 0 0 0;
}

.controls { margin: 0 0 24px 0; display: flex; gap: 10px; flex-wrap: wrap; }
.ctrl-btn {
    font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 8px 18px;
    border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: #aaa; cursor: pointer; transition: all 0.2s;
    letter-spacing: 1px;
}
.ctrl-btn:hover, .ctrl-btn.active {
    background: rgba(16,185,129,0.12);
    border-color: #10b981; color: #10b981;
}

#userTable {
    width: 100%;
    border-collapse: collapse;
    font-size: 20px;
}
#userTable th {
    padding: 14px;
    background: #333;
    color: white;
    text-align: center;
    font-size: 20px;
    border: 1px solid #555;
}
#userTable td {
    padding: 14px;
    text-align: center;
    border: 1px solid #444;
    vertical-align: middle;
}
#userTable tr:hover td { background: rgba(230,213,184,0.05); }

.badge {
    display: inline-block; padding: 4px 12px;
    border-radius: 999px; font-size: 12px; font-weight: 500;
}
.badge-pending  { background:rgba(245,158,11,0.15); color:#fbbf24; border:1px solid rgba(245,158,11,0.3); }
.badge-approved { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.3); }
.badge-rejected { background:rgba(239,68,68,0.15);  color:#f87171; border:1px solid rgba(239,68,68,0.3); }
.badge-manual   { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.3); }

.action-btn {
    padding: 7px 14px; border-radius: 8px; border: none;
    font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; margin: 2px; transition: all 0.2s;
}
.btn-approve { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.3); }
.btn-approve:hover { background:rgba(16,185,129,0.3); }
.btn-reject  { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
.btn-reject:hover  { background:rgba(239,68,68,0.3); }
.btn-manual  { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.3); }
.btn-manual:hover  { background:rgba(139,92,246,0.3); }

.score-wrap { display:flex; align-items:center; gap:10px; }
.score-bar-bg { flex:1; height:5px; border-radius:99px; background:rgba(255,255,255,0.08); overflow:hidden; }
.score-bar-fill { height:100%; border-radius:99px; }

.empty-state { text-align:center; padding:60px 20px; color:#555; }
.empty-state .ei { font-size:48px; margin-bottom:12px; }
.empty-state p { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:1px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.anim-row { animation: fadeUp 0.35s ease both; }

.popup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; }
.popup-content {
    background:#1a1a2e; padding:30px; width:340px;
    margin:120px auto; border-radius:16px;
    text-align:center; font-family:'DM Mono',monospace;
    border: 1px solid rgba(255,255,255,0.1);
}
.popup-content h3 { font-family:'Syne',sans-serif; font-size:1.2rem; margin:0 0 16px 0; }
.popup-content input {
    width:100%; padding:12px; border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.05);
    color:white; font-family:'DM Mono',monospace; font-size:14px;
    margin-bottom:14px;
}
.popup-content button { margin:4px; }
</style>
</head>
<body>

<div class="topbar"><h2>FinRisk - Banker Dashboard</h2></div>

<div class="container">
<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='/banker_dashboard'">Dashboard</button>
<button onclick="location.href='/loan_requests'">Loan Requests</button>
<button onclick="location.href='/banker_review'">Review Queue</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="page-header">
    <div class="icon-wrap">📋</div>
    <div>
        <h1>My Applications</h1>
        <p class="subtitle">Cases you have claimed</p>
    </div>
</div>

<div class="controls">
    <button class="ctrl-btn active" onclick="filterTable('all', this)">All</button>
    <button class="ctrl-btn" onclick="filterTable('Picked Up', this)">Pending Review</button>
    <button class="ctrl-btn" onclick="filterTable('Approved', this)">Approved</button>
    <button class="ctrl-btn" onclick="filterTable('Rejected', this)">Rejected</button>
    <button class="ctrl-btn" onclick="filterTable('Manual Review', this)">Manual Review</button>
    <button class="ctrl-btn" onclick="sortByScore()">↑ Sort by Score</button>
</div>

<table id="userTable">
<thead><tr>
<th>Name</th><th>Phone</th><th>Loan Amount</th>
<th>Type</th><th>Tenure</th><th>EMI</th>
<th>Risk Score</th><th>Status</th><th>Action</th>
</tr></thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<!-- REJECT POPUP -->
<div id="rejectPopup" class="popup">
<div class="popup-content">
<h3>Reason for Rejection</h3>
<input type="text" id="rejectReason" placeholder="Enter reason...">
<div>
<button class="action-btn btn-reject" onclick="submitReject()">Submit</button>
<button class="action-btn btn-manual" onclick="closePopup()">Cancel</button>
</div>
</div>
</div>

<script>

let applications = [];
let selectedId   = null;

let currentBankerId = localStorage.getItem("currentBanker") || "";
let bankerData      = currentBankerId ? JSON.parse(localStorage.getItem("banker_" + currentBankerId) || "{}") : {};
let bankerName      = bankerData.name || "";

function fetchUsers(){
    if(!bankerName){
        /* Banker not identified — show warning */
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:#f87171;">
            Could not identify banker. Please <a href="/" style="color:#e6d5b8;">logout and login again</a>.
        </td></tr>`;
        return;
    }
    fetch("/users")
    .then(res => res.json())
    .then(data => {
        /* ONLY show applications this banker has claimed (allocated_banker === bankerName) */
        applications = data
            .map(u => ({
                id: u[0], name: u[1], phone: u[2],
                loan: u[3], loanType: u[4], tenure: u[5],
                emi: u[6], score: u[7], banker: u[8],
                status: u[9], reason: u[10]
            }))
            .filter(u => u.banker && u.banker === bankerName);
        renderTable(applications);
    });
}

function renderTable(data){
    let body = document.getElementById("tableBody");
    body.innerHTML = "";

    if(data.length === 0){
        body.innerHTML = `<tr><td colspan="9">
<div class="empty-state">
<div class="ei">📂</div>
<p>No applications claimed yet.<br>Go to <a href="/loan_requests" style="color:#3b82f6;">Loan Requests</a> to pick one up.</p>
</div></td></tr>`;
        return;
    }

    data.forEach((u, i) => {
        let scoreColor = u.score >= 75 ? "#10b981" : u.score >= 55 ? "#f59e0b" : "#ef4444";
        let riskLabel  = u.score >= 75 ? "Low Risk" : u.score >= 55 ? "Medium Risk" : "High Risk";
        let badgeClass = { "Approved":"badge-approved","Rejected":"badge-rejected","Manual Review":"badge-manual" }[u.status] || "badge-pending";
        let statusText = u.status === "Picked Up" ? "Pending Review" : (u.status || "Pending");

        let row = document.createElement("tr");
        row.className = "anim-row";
        row.style.animationDelay = (i * 0.05) + "s";
        row.innerHTML = `
<td><b style="font-family:'Syne',sans-serif;">${u.name||""}</b></td>
<td style="color:#888;">${u.phone||""}</td>
<td>₹${u.loan ? Number(u.loan).toLocaleString() : 0}</td>
<td>${u.loanType||""}</td>
<td>${u.tenure||""} mo</td>
<td>₹${u.emi ? Number(u.emi).toLocaleString() : 0}</td>
<td>
  <div class="score-wrap">
    <span style="color:${scoreColor};font-weight:600;min-width:28px;">${u.score||0}</span>
    <div class="score-bar-bg">
      <div class="score-bar-fill" style="width:${u.score||0}%;background:${scoreColor};"></div>
    </div>
    <span style="color:#666;font-size:11px;">${riskLabel}</span>
  </div>
</td>
<td><span class="badge ${badgeClass}">${statusText}</span>${u.reason?"<br><small style='color:#666;font-size:11px;'>("+u.reason+")</small>":""}</td>
<td>
<button class="action-btn btn-approve" onclick="approve(${u.id})">Approve</button>
<button class="action-btn btn-reject"  onclick="openReject(${u.id})">Reject</button>
<button class="action-btn btn-manual"  onclick="manualReview(${u.id})">Manual</button>
</td>`;
        body.appendChild(row);
    });
}

function filterTable(status, btn){
    document.querySelectorAll(".ctrl-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if(status === "all") renderTable(applications);
    else renderTable(applications.filter(u => u.status === status || (status === "Picked Up" && (u.status === "Picked Up" || u.status === "Pending"))));
}

function sortByScore(){
    renderTable([...applications].sort((a,b) => b.score - a.score));
}

function approve(id){
    fetch("/banker_action",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ user_id:id, action:"Approved", reason:"Approved by banker" })
    }).then(()=> fetchUsers());
}

function openReject(id){
    selectedId = id;
    document.getElementById("rejectReason").value = "";
    document.getElementById("rejectPopup").style.display = "block";
}

function submitReject(){
    let reason = document.getElementById("rejectReason").value;
    fetch("/banker_action",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ user_id:selectedId, action:"Rejected", reason:reason })
    }).then(()=>{ closePopup(); fetchUsers(); });
}

function manualReview(id){
    fetch("/banker_action",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ user_id:id, action:"Manual Review", reason:"Under verification" })
    }).then(()=> fetchUsers());
}

function closePopup(){
    document.getElementById("rejectPopup").style.display = "none";
}

function logout(){
    localStorage.removeItem("currentBanker");
    window.location.href = "/";
}

fetchUsers();

</script>
</body>
</html>
