<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banker Profile</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
.profile-wrap { max-width: 700px; margin: 40px auto; }
.avatar-ring {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; margin: 0 auto 20px auto;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.2), 0 0 0 8px rgba(59,130,246,0.08);
}
.profile-name {
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    color: #e6d5b8; text-align: center; margin: 0 0 4px 0;
}
.profile-role {
    font-family: 'DM Mono', monospace; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    color: #888; text-align: center; margin-bottom: 32px;
}
.info-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 28px; margin-bottom: 20px;
}
.info-card h3 {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: #888;
    margin: 0 0 20px 0; padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'DM Mono', monospace;
}
.info-row:last-child { border-bottom: none; }
.info-row .lbl { font-size: 13px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
.info-row .val { font-size: 16px; color: #e6d5b8; font-weight: 500; }
.perf-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.perf-box {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 18px; text-align: center; transition: transform 0.2s;
}
.perf-box:hover { transform: translateY(-3px); }
.perf-box .pnum { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; display: block; }
.perf-box .plbl { font-family: 'DM Mono', monospace; font-size: 11px; color: #666; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; display: block; }
</style>
<style>
.edit-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #e6d5b8, #bfa980);
    color: #111; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin: 20px auto 0 auto;
    width: auto; display: block;
}
.edit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230,213,184,0.3); }
</style>
</head>
<body>

<div class="topbar"><h2>FinRisk - Banker Profile</h2></div>

<div class="container">
<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='/banker_dashboard'">Dashboard</button>
<button onclick="location.href='/loan_requests'">Loan Requests</button>
<button onclick="location.href='/banker_review'">Review Queue</button>
<button onclick="location.href='/banker_profile'">Profile</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<div class="profile-wrap">

<div class="avatar-ring">🏦</div>
<p class="profile-name" id="pName">—</p>
<p class="profile-role">Banker Account</p>

<div class="info-card">
<h3>Account Information</h3>
<div class="info-row"><span class="lbl">Banker ID</span><span class="val" id="pId">—</span></div>
<div class="info-row"><span class="lbl">Bank Name</span><span class="val" id="pBank">—</span></div>
<div class="info-row"><span class="lbl">IFSC Code</span><span class="val" id="pIfsc">—</span></div>
<div class="info-row"><span class="lbl">Account Type</span><span class="val">Banker</span></div>
</div>

<div class="info-card">
<h3>Performance</h3>
<div class="perf-grid">
    <div class="perf-box"><span class="pnum" id="pTotal" style="color:#e6d5b8;">0</span><span class="plbl">Total Cases</span></div>
    <div class="perf-box"><span class="pnum" id="pApproved" style="color:#34d399;">0</span><span class="plbl">Approved</span></div>
    <div class="perf-box"><span class="pnum" id="pRejected" style="color:#f87171;">0</span><span class="plbl">Rejected</span></div>
    <div class="perf-box"><span class="pnum" id="pManual" style="color:#a78bfa;">0</span><span class="plbl">Manual</span></div>
</div>
</div>

</div>
</div>
</div>

<script>
window.addEventListener("DOMContentLoaded", function(){
    fetch("/api/session").then(r=>r.json()).then(function(sess){
        if(!sess.role || sess.role !== "banker"){ window.location.href="/"; return; }

        let bid = sess.banker_id;
        document.getElementById("pName").innerText = sess.name || "—";
        document.getElementById("pId").innerText   = bid       || "—";

        /* Fetch full banker info */
        fetch("/api/get_banker/" + encodeURIComponent(bid))
        .then(r=>r.json()).then(function(bd){
            document.getElementById("pBank").innerText = bd.bankName || "—";
            document.getElementById("pIfsc").innerText = bd.ifsc     || "—";
        });

        /* Fetch live stats */
        fetch("/api/bankers").then(r=>r.json()).then(function(bankers){
            let me = bankers.find(function(b){ return b.bankerId === bid || b.name === sess.name; });
            if(me){
                document.getElementById("pTotal").innerText    = me.totalCustomers || 0;
                document.getElementById("pApproved").innerText = me.approval       || 0;
                document.getElementById("pRejected").innerText = me.rejection      || 0;
                document.getElementById("pManual").innerText   = me.manual         || 0;
            }
        });
    }).catch(function(){ window.location.href="/"; });
});

function logout(){
    fetch('/logout',{method:'POST'}).finally(function(){ window.location.href='/'; });
}

function openEdit(){
    fetch("/api/session").then(r=>r.json()).then(function(sess){
        fetch("/api/get_banker/"+encodeURIComponent(sess.banker_id)).then(r=>r.json()).then(function(bd){
            document.getElementById("editName").value     = sess.name      || "";
            document.getElementById("editBankName").value = bd.bankName    || "";
            document.getElementById("editIfsc").value     = bd.ifsc        || "";
            document.getElementById("editPopup").classList.add("show");
        });
    });
}
function closeEdit(){ document.getElementById("editPopup").classList.remove("show"); }
function saveEdit(){
    /* Banker profile edits are informational only (no server update endpoint needed for now) */
    document.getElementById("pName").innerText = document.getElementById("editName").value.trim();
    document.getElementById("pBank").innerText = document.getElementById("editBankName").value.trim();
    document.getElementById("pIfsc").innerText = document.getElementById("editIfsc").value.trim();
    document.getElementById("editMsg").innerText = "✓ Saved!";
    setTimeout(()=>{ closeEdit(); document.getElementById("editMsg").innerText=""; }, 1200);
}

/* ── MOBILE SIDEBAR ── */
(function(){
    let sidebar = document.querySelector('.sidebar');
    if(!sidebar) return;
    let btn = document.createElement('button');
    btn.className = 'hamburger';
    btn.innerHTML = '☰';
    document.body.appendChild(btn);
    let overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);
    btn.addEventListener('click', function(){
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    });
    overlay.addEventListener('click', function(){
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
    });
})();
    
</script>
</body>
</html>
