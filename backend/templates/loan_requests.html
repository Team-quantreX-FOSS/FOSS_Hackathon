<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Requests</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

* { box-sizing: border-box; }

.page-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin: 32px 0 28px 0;
    padding-bottom: 18px;
    border-bottom: 2px solid rgba(255,255,255,0.08);
}

.page-header .icon-wrap {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, #e6d5b8, #bfa980);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(230,213,184,0.3);
    
}

@keyframes glow {
    0%,100% { box-shadow: 0 4px 20px rgba(230,213,184,0.3); }
    50%      { box-shadow: 0 4px 32px rgba(59,130,246,0.7); }
}

.page-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin: 0;
    color: #e6d5b8;
}

.page-header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #bfa980;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 3px 0 0 0;
}

/* LIVE BADGE */
.live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(230,213,184,0.1);
    border: 1px solid rgba(230,213,184,0.25);
    color: #e6d5b8;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 24px;
}

.live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #e6d5b8;
    animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
}

/* CARDS GRID */
.requests-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    margin-top: 8px;
}

.request-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 22px;
    transition: all 0.25s;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
}

.request-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    border-radius: 18px 18px 0 0;
}

.request-card:hover {
    border-color: rgba(59,130,246,0.3);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(59,130,246,0.12);
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}

.card-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin: 0 0 4px 0;
    color: #e6d5b8;
}

.card-phone {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #888;
    margin: 0 0 18px 0;
}

.card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.card-row .label {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #bfa980;
}

.card-row .value {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: #e6d5b8;
}

/* RISK PILL */
.risk-pill {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 600;
}

.risk-low    { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.risk-medium { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.risk-high   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

/* PICKUP BUTTON */
.pickup-btn {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #e6d5b8, #bfa980);
    color: #111;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(230,213,184,0.2);
}

.pickup-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(230,213,184,0.3);
}

.pickup-btn:active { transform: scale(0.98); }

.pickup-btn.claimed {
    background: rgba(16,185,129,0.15);
    color: #34d399;
    border: 1px solid rgba(16,185,129,0.3);
    box-shadow: none;
    cursor: default;
}

/* EMPTY STATE */
.empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: #bfa980;
}

.empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; }

.empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    margin: 0 0 8px 0;
    color: #777;
}

.empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: #bfa980;
}

/* COUNT BADGE */
.count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e6d5b8, #bfa980);
    color: #111;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    width: 26px; height: 26px;
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
}

</style>
</head>

<body>

<div class="topbar"><h2>FinRisk - Loan Requests</h2></div>

<div class="container">

<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='/banker_dashboard'">📋 Dashboard</button>
<button onclick="location.href='/loan_requests'">📥 Loan Requests</button>
<button onclick="location.href='/banker_review'">🧠 Review Queue</button>
<button onclick="location.href='/banker_profile'">👤 Profile</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<!-- HEADER -->
<div class="page-header">
    <div class="icon-wrap">📋</div>
    <div>
        <h1>Open Loan Requests <span id="requestCount" class="count-badge">0</span></h1>
        <p class="subtitle">Unassigned applications awaiting a banker</p>
    </div>
</div>

<div class="live-badge">
    <span class="live-dot"></span>
    Live — auto-refreshes every 10 seconds
</div>

<!-- CARDS GRID -->
<div class="requests-grid" id="requestsGrid"></div>

</div>
</div>

<script>

let myBanker = "";
let currentBankerId = localStorage.getItem("currentBanker") || "";
if(currentBankerId){
    let bd = JSON.parse(localStorage.getItem("banker_" + currentBankerId) || "{}");
    myBanker = bd.name || "";
    if(!myBanker){
        fetch("/api/get_banker/" + currentBankerId)
        .then(r=>r.json())
        .then(data=>{ if(data.name){ myBanker=data.name; } })
        .catch(()=>{});
    }
}

function loadRequests(){
    fetch("/users")
    .then(res => res.json())
    .then(data => {
        /* Only unassigned (no allocated_banker) */
        let unassigned = data
            .map(u => ({
                id:       u[0],
                name:     u[1],
                phone:    u[2],
                loan:     u[3],
                loanType: u[4],
                tenure:   u[5],
                emi:      u[6],
                score:    u[7],
                banker:   u[8],
                status:   u[9]
            }))
            .filter(u => !u.banker);

        document.getElementById("requestCount").innerText = unassigned.length;
        renderCards(unassigned);
    });
}

function renderCards(data){
    let grid = document.getElementById("requestsGrid");
    grid.innerHTML = "";

    if(data.length === 0){
        grid.innerHTML = `
<div class="empty-state">
    <div class="empty-icon">🎉</div>
    <h3>All caught up!</h3>
    <p>No unassigned loan requests at the moment.</p>
</div>`;
        return;
    }

    data.forEach((u, i) => {
        let riskClass = u.score >= 75 ? "risk-low" : u.score >= 55 ? "risk-medium" : "risk-high";
        let riskLabel = u.score >= 75 ? "Low Risk"  : u.score >= 55 ? "Medium Risk" : "High Risk";

        let card = document.createElement("div");
        card.className = "request-card";
        card.style.animationDelay = (i * 0.07) + "s";
        let safeN = (u.name||"").replace(/'/g,"\\'");
        let safeP = (u.phone||"").replace(/'/g,"\\'");
        card.innerHTML = `
<p class="card-name">${u.name || "—"}</p>
<p class="card-phone">📞 ${u.phone || "—"}</p>
<button onclick="viewBorrowerProfile('${safeN}','${safeP}')" style="margin-bottom:10px;padding:5px 12px;font-family:DM Mono,monospace;font-size:11px;background:rgba(230,213,184,0.08);border:1px solid rgba(230,213,184,0.2);color:#bfa980;border-radius:6px;cursor:pointer;width:100%;">👁 View Profile</button>

<div class="card-row">
    <span class="label">Loan Amount</span>
    <span class="value">₹${u.loan ? Number(u.loan).toLocaleString() : "—"}</span>
</div>
<div class="card-row">
    <span class="label">Loan Type</span>
    <span class="value">${u.loanType || "—"}</span>
</div>
<div class="card-row">
    <span class="label">Tenure</span>
    <span class="value">${u.tenure || "—"} months</span>
</div>
<div class="card-row">
    <span class="label">EMI</span>
    <span class="value">₹${u.emi ? Number(u.emi).toLocaleString() : "—"}</span>
</div>
<div class="card-row">
    <span class="label">Risk</span>
    <span class="risk-pill ${riskClass}">${riskLabel} · ${u.score}</span>
</div>

<button class="pickup-btn" id="btn-${u.id}" onclick="pickUp(${u.id}, this)">
    Pick Up Request
</button>`;

        grid.appendChild(card);
    });
}

function pickUp(id, btn){
    if(!myBanker){
        alert("Could not identify banker. Please logout and login again.");
        return;
    }

    btn.disabled  = true;
    btn.innerText = "Claiming...";

    fetch("/pickup_loan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: id, banker_name: myBanker })
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert(data.error);
            btn.disabled  = false;
            btn.innerText = "Pick Up Request";
            return;
        }
        btn.className = "pickup-btn claimed";
        btn.innerText = "✓ Claimed — view in Dashboard";
        btn.onclick   = () => location.href = "/banker_dashboard";

        /* Refresh count */
        setTimeout(loadRequests, 1200);
    })
    .catch(() => {
        btn.disabled  = false;
        btn.innerText = "Pick Up Request";
        alert("Server error. Try again.");
    });
}

function logout(){
    localStorage.removeItem("currentBanker");
    window.location.href = "/";
}

loadRequests();
/* Auto-refresh every 10 seconds */
setInterval(loadRequests, 10000);

</script>







<!-- PROFILE OVERLAY -->
<div id="profileOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.82);z-index:9999;overflow-y:auto;">
<div id="profileBox" style="background:#1a1614;border:1px solid rgba(230,213,184,0.2);border-radius:20px;width:540px;max-width:95vw;margin:40px auto 60px;padding:28px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08);">
        <h2 style="font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:#e6d5b8;margin:0;">🪪 Borrower Profile</h2>
        <button onclick="document.getElementById('profileOverlay').style.display='none'" style="background:none;border:none;color:#888;font-size:26px;cursor:pointer;line-height:1;">✕</button>
    </div>
    <div id="profileContent2"></div>
</div>
</div>

<script>
function openProfile(name, phone){
    document.getElementById("profileOverlay").style.display = "block";
    let el = document.getElementById("profileContent2");
    el.innerHTML = '<div style="text-align:center;padding:32px;font-family:DM Mono,monospace;font-size:14px;color:#888;">⏳ Loading...</div>';

    fetch("/api/borrower_profile?phone=" + encodeURIComponent(phone) + "&name=" + encodeURIComponent(name))
    .then(function(r){ return r.json(); })
    .then(function(d){
        el.innerHTML = "";
        if(d.error){
            el.innerHTML = '<p style="font-family:DM Mono,monospace;font-size:14px;color:#666;text-align:center;">No detailed profile uploaded yet.</p>';
            appendRow2(el,"Name",name); appendRow2(el,"Phone",phone);
            return;
        }
        appendSection2(el,"Personal Details");
        appendRow2(el,"Full Name",  d.name||name);
        appendRow2(el,"Age",        d.age||"—");
        appendRow2(el,"Phone",      d.phone||phone);
        appendRow2(el,"Email",      d.email||"—");
        appendRow2(el,"Address",    d.address||"—");
        appendRow2(el,"Employment", d.employment||"—");
        appendRow2(el,"Employer",   d.employer||"—");
        appendSection2(el,"KYC Details");
        appendRow2(el,"Aadhar",     d.aadhar||"—");
        appendRow2(el,"PAN",        d.pan||"—");
        appendSection2(el,"Bank Details");
        appendRow2(el,"Account Holder", d.account_holder||"—");
        appendRow2(el,"Account Number", d.account_number||"—");
        appendRow2(el,"IFSC",           d.ifsc||"—");
        appendSection2(el,"Loan Purpose");
        appendRow2(el,"Purpose", d.purpose||"—");
        if(d.aadhar_img || d.pan_img || d.salary_img || d.bank_stmt){
            appendSection2(el,"Uploaded Documents");
            if(d.aadhar_img)  appendDoc2(el,"Aadhar Card",d.aadhar_img);
            if(d.pan_img)     appendDoc2(el,"PAN Card",d.pan_img);
            if(d.salary_img)  appendDoc2(el,"Salary Slip",d.salary_img);
            if(d.bank_stmt)   appendDoc2(el,"Bank Statement",d.bank_stmt);
        }
    })
    .catch(function(){
        el.innerHTML = '<div style="text-align:center;padding:32px;font-family:DM Mono,monospace;font-size:14px;color:#f87171;">Error loading profile.</div>';
    });
}

function appendSection2(p,t){
    let d=document.createElement("div");
    d.style.cssText="font-family:Syne,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#666;margin:16px 0 8px 0;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);";
    d.textContent=t; p.appendChild(d);
}
function appendRow2(p,label,value){
    let d=document.createElement("div");
    d.style.cssText="display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);";
    let l=document.createElement("span");
    l.style.cssText="font-family:DM Mono,monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#666;white-space:nowrap;margin-right:12px;";
    l.textContent=label;
    let v=document.createElement("span");
    v.style.cssText="font-family:DM Mono,monospace;font-size:13px;color:#e6d5b8;text-align:right;word-break:break-all;";
    v.textContent=value;
    d.appendChild(l); d.appendChild(v); p.appendChild(d);
}
function appendDoc2(p,label,src){
    let wrap=document.createElement("div");
    wrap.style.cssText="margin:12px 0;";
    let lbl=document.createElement("div");
    lbl.style.cssText="font-family:DM Mono,monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#666;margin-bottom:8px;";
    lbl.textContent=label;
    let img=document.createElement("img");
    img.src=src;
    img.style.cssText="width:100%;border-radius:10px;border:1px solid rgba(255,255,255,0.12);cursor:pointer;display:block;";
    img.title="Click to open full size";
    img.addEventListener("click",function(){ window.open(this.src,"_blank"); });
    img.addEventListener("error",function(){
        let e=document.createElement("div");
        e.style.cssText="font-family:DM Mono,monospace;font-size:12px;color:#666;padding:8px;";
        e.textContent="Could not display image";
        this.parentElement.replaceChild(e,this);
    });
    let hint=document.createElement("div");
    hint.style.cssText="font-family:DM Mono,monospace;font-size:10px;color:#555;margin-top:4px;";
    hint.textContent="Click image to open full size";
    wrap.appendChild(lbl); wrap.appendChild(img); wrap.appendChild(hint);
    p.appendChild(wrap);
}
</script>
</body>
</html>
