<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Profile</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
.profile-wrap { max-width: 700px; margin: 40px auto; }
.avatar-ring {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, #bfa980, #8a6e50);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; margin: 0 auto 20px auto;
    box-shadow: 0 0 0 4px rgba(191,169,128,0.25), 0 0 0 8px rgba(191,169,128,0.1);
}
.profile-name { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:#e6d5b8; text-align:center; margin:0 0 4px 0; }
.profile-role { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#888; text-align:center; margin-bottom:32px; }
.info-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:28px; margin-bottom:20px; }
.info-card h3 { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#888; margin:0 0 20px 0; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.06); }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-family:'DM Mono',monospace; }
.info-row:last-child { border-bottom:none; }
.info-row .lbl { font-size:13px; color:#666; letter-spacing:1px; text-transform:uppercase; }
.info-row .val { font-size:16px; color:#e6d5b8; font-weight:500; }
.sys-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.sys-box { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:18px; text-align:center; transition:transform 0.2s; }
.sys-box:hover { transform:translateY(-3px); }
.sys-box .snum { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; display:block; }
.sys-box .slbl { font-family:'DM Mono',monospace; font-size:11px; color:#666; letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; display:block; }
</style>
<style>
.edit-btn {
    padding: 12px 28px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #e6d5b8, #bfa980);
    color: #111; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    margin: 20px auto 0 auto; display: block;
}
.edit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230,213,184,0.3); }
</style>
</head>
<body>

<div class="topbar"><h2>FinRisk - Admin Profile</h2></div>

<div class="container">
<div class="sidebar">
<h2>Admin</h2>
<button onclick="location.href='/admin_dashboard'">Banks</button>
<button onclick="location.href='/admin_borrowers'">Borrowers</button>
<button onclick="location.href='/admin_bankers'">Bankers</button>
<button onclick="location.href='/admin_profile'">Profile</button>
<button onclick="window.location.href='/'">Logout</button>
</div>

<div class="main">
<div class="profile-wrap">

<div class="avatar-ring">🛡</div>
<p class="profile-name" id="pName">Admin</p>
<p class="profile-role">System Administrator</p>

<div class="info-card">
<h3>Account Information</h3>
<div class="info-row"><span class="lbl">Admin ID</span><span class="val" id="pId">—</span></div>
<div class="info-row"><span class="lbl">Name</span><span class="val" id="pNameRow">—</span></div>
<div class="info-row"><span class="lbl">Email</span><span class="val" id="pEmail">—</span></div>
<div class="info-row"><span class="lbl">Role</span><span class="val">System Administrator</span></div>
</div>

<div class="info-card">
<h3>System Overview</h3>
<div class="sys-grid">
    <div class="sys-box"><span class="snum" id="sTotalBankers" style="color:#3b82f6;">0</span><span class="slbl">Bankers</span></div>
    <div class="sys-box"><span class="snum" id="sTotalBorrowers" style="color:#e6d5b8;">0</span><span class="slbl">Borrowers</span></div>
    <div class="sys-box"><span class="snum" id="sTotalBanks" style="color:#f59e0b;">0</span><span class="slbl">Banks</span></div>
</div>
</div>

</div>
</div>
</div>

<script>
window.addEventListener("DOMContentLoaded", function(){
    /* Get the currently logged-in admin from localStorage */
    /* Admin stores their ID in localStorage during login */
    let adminData = null;
    let adminKey  = null;

    /* Search for which admin is currently active by finding most recently set */
    for(let i=0; i<localStorage.length; i++){
        let key = localStorage.key(i);
        if(key && key.startsWith("admin_")){
            let d = JSON.parse(localStorage.getItem(key) || "{}");
            /* Pick the one that matches currentAdmin if set, else last found */
            if(!adminData || localStorage.getItem("currentAdmin") === d.adminId){
                adminData = d;
                adminKey  = key;
            }
        }
    }

    if(adminData){
        document.getElementById("pName").innerText    = adminData.name    || "Admin";
        document.getElementById("pNameRow").innerText = adminData.name    || "—";
        document.getElementById("pEmail").innerText   = adminData.email   || "—";
        document.getElementById("pId").innerText      = adminData.adminId || (adminKey||"").replace("admin_","");
    }

    /* Live system stats */
    fetch("/api/bankers").then(r=>r.json()).then(d=>{
        document.getElementById("sTotalBankers").innerText = d.length;
        let banks = new Set(d.map(b=>b.bankName));
        document.getElementById("sTotalBanks").innerText = banks.size;
    });
    fetch("/api/users").then(r=>r.json()).then(d=>{
        document.getElementById("sTotalBorrowers").innerText = d.length;
    });
});

function openEdit(){
    for(let i=0;i<localStorage.length;i++){
        let key=localStorage.key(i);
        if(key&&key.startsWith("admin_")){
            let d=JSON.parse(localStorage.getItem(key)||"{}");
            document.getElementById("editName").value  = d.name  || "";
            document.getElementById("editEmail").value = d.email || "";
            break;
        }
    }
    document.getElementById("editPopup").classList.add("show");
}
function closeEdit(){ document.getElementById("editPopup").classList.remove("show"); }
function saveAdminEdit(){
    for(let i=0;i<localStorage.length;i++){
        let key=localStorage.key(i);
        if(key&&key.startsWith("admin_")){
            let d=JSON.parse(localStorage.getItem(key)||"{}");
            d.name  = document.getElementById("editName").value.trim();
            d.email = document.getElementById("editEmail").value.trim();
            localStorage.setItem(key, JSON.stringify(d));
            document.getElementById("pName").innerText    = d.name;
            document.getElementById("pNameRow").innerText = d.name;
            document.getElementById("pEmail").innerText   = d.email;
            break;
        }
    }
    document.getElementById("editMsg").innerText = "✓ Saved!";
    setTimeout(()=>{ closeEdit(); document.getElementById("editMsg").innerText=""; }, 1200);
}

</script>
</body>
</html>
